name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject NASA API key from secret
        env:
          NASA_KEY: ${{ secrets.NASA_KEY }}
        run: |
          if [ -n "$NASA_KEY" ]; then
            sed -i "s/__NASA_KEY__/$NASA_KEY/" space-now/index.html
            echo "NASA key injected"
          else
            echo "No NASA_KEY secret set — site will fall back to DEMO_KEY"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4

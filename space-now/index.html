<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>space · right now</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
<style>
:root{
  --bg:#060a13; --text:#e6edf7; --muted:#8b98ad;
  --cyan:#6ee7ff; --violet:#a78bfa; --pink:#f0abfc; --yellow:#fcd34d;
  --glass:rgba(255,255,255,.04); --edge:rgba(255,255,255,.09);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
  background:
    radial-gradient(1100px 500px at 80% -10%, rgba(167,139,250,.08), transparent 60%),
    radial-gradient(900px 500px at 10% 110%, rgba(110,231,255,.06), transparent 60%),
    var(--bg);
  color:var(--text); font-family:var(--mono); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--cyan)}
.arcade-link{
  position:fixed; top:10px; left:12px; z-index:50; text-decoration:none;
  font-size:12px; letter-spacing:.08em; color:var(--muted);
  background:var(--glass); border:1px solid var(--edge); border-radius:8px;
  padding:5px 10px; backdrop-filter:blur(6px);
}
.arcade-link:hover{color:var(--cyan); border-color:rgba(110,231,255,.4)}
header{
  max-width:1180px; margin:0 auto; padding:54px 16px 6px;
  display:flex; flex-wrap:wrap; align-items:baseline; gap:10px 22px;
}
header h1{
  font-size:clamp(19px,3.4vw,28px); letter-spacing:.18em; font-weight:700;
  text-shadow:0 0 22px rgba(110,231,255,.35);
}
header h1 .dim{color:var(--muted); font-weight:400}
.live-dot{
  display:inline-block; width:9px; height:9px; border-radius:50%;
  background:#4ade80; box-shadow:0 0 8px #4ade80; vertical-align:2px; margin-right:8px;
  animation:pulse 1.6s ease-in-out infinite;
}
.clocks{display:flex; gap:18px; font-size:13px; color:var(--muted); margin-left:auto}
.clocks b{color:var(--text); font-weight:600; font-variant-numeric:tabular-nums}
main{
  max-width:1180px; margin:0 auto; padding:14px 16px 40px;
  display:grid; grid-template-columns:3fr 2fr; gap:14px;
}
.panel{
  background:var(--glass); border:1px solid var(--edge); border-radius:14px;
  padding:14px 16px; min-height:150px; position:relative; overflow:hidden;
  backdrop-filter:blur(6px);
}
.panel-head{
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
  font-size:12px; letter-spacing:.14em; color:var(--muted);
}
.panel-head .t{color:var(--text); font-weight:600}
.chip{
  margin-left:auto; font-size:10px; letter-spacing:.1em; padding:2px 8px;
  border-radius:999px; border:1px solid var(--edge); color:var(--muted);
}
.chip.live{color:#4ade80; border-color:rgba(74,222,128,.35)}
.chip.stale{color:var(--yellow); border-color:rgba(252,211,77,.35)}
.chip.err{color:var(--pink); border-color:rgba(240,171,252,.4)}
/* ---- map ---- */
.mapwrap{aspect-ratio:2/1; width:100%; border:1px solid var(--edge); border-radius:10px;
  background:rgba(0,0,0,.25); overflow:hidden}
.mapwrap svg{display:block; width:100%; height:100%}
.coast{fill:none; stroke:var(--muted); stroke-opacity:.55; stroke-width:1}
.grat{stroke:var(--edge); stroke-width:.6}
.track{fill:none; stroke:var(--cyan); stroke-width:1.6; stroke-linecap:round}
.predict{fill:none; stroke:var(--violet); stroke-width:1.4; stroke-dasharray:3 6; opacity:.8}
.iss-dot{fill:var(--cyan)}
.iss-glow{fill:none; stroke:var(--cyan); opacity:.8; animation:ping 2.2s ease-out infinite; transform-origin:center; transform-box:fill-box}
.footprint{fill:rgba(110,231,255,.05); stroke:rgba(110,231,255,.25); stroke-width:.8}
.readouts{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-top:10px}
.readouts .r{background:rgba(0,0,0,.22); border:1px solid var(--edge); border-radius:8px; padding:7px 9px}
.readouts .k{font-size:10px; letter-spacing:.12em; color:var(--muted)}
.readouts .v{font-size:15px; margin-top:2px; font-variant-numeric:tabular-nums}
.readouts .v .u{font-size:10px; color:var(--muted)}
.over-line{margin-top:8px; font-size:12px; color:var(--muted)}
.over-line b{color:var(--text)}
/* ---- humans ---- */
.big-count{font-size:64px; line-height:1; font-weight:700; color:var(--cyan);
  text-shadow:0 0 30px rgba(110,231,255,.4)}
.big-label{font-size:11px; letter-spacing:.14em; color:var(--muted); margin:4px 0 12px}
.craft{margin-top:10px}
.craft h3{font-size:11px; letter-spacing:.14em; color:var(--violet); margin-bottom:5px}
.craft ul{list-style:none; font-size:13px; line-height:1.75}
.craft li .ag{color:var(--muted); font-size:11px}
.foot-note{margin-top:12px; font-size:10px; color:var(--muted)}
.foot-note a{color:var(--muted)}
/* ---- launches ---- */
.launch{display:flex; flex-wrap:wrap; gap:4px 12px; align-items:baseline;
  padding:9px 2px; border-bottom:1px dashed var(--edge)}
.launch:last-child{border-bottom:none}
.launch .nm{font-size:13px; font-weight:600; flex:1 1 220px}
.launch .meta{font-size:11px; color:var(--muted); flex:1 1 100%}
.launch .st{font-size:10px; padding:1px 7px; border-radius:999px; border:1px solid var(--edge); color:var(--muted)}
.launch .st.go{color:#4ade80; border-color:rgba(74,222,128,.35)}
.cd{font-size:14px; color:var(--yellow); font-variant-numeric:tabular-nums; white-space:nowrap}
.cd .sep{animation:blink 1s step-end infinite}
.cd.t0{color:var(--pink)}
/* ---- apod ---- */
.apod-img{width:100%; max-height:260px; object-fit:cover; border-radius:10px; border:1px solid var(--edge); display:block}
.apod-title{font-size:14px; font-weight:600; margin:10px 0 2px; color:var(--pink)}
.apod-date{font-size:10px; color:var(--muted); letter-spacing:.1em}
.apod-x{font-size:12px; color:var(--muted); line-height:1.55; margin-top:6px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; cursor:pointer}
.apod-x.open{-webkit-line-clamp:unset; display:block}
.apod-x::after{content:" [tap to expand]"; color:var(--violet)}
.apod-x.open::after{content:" [collapse]"}
.apod-video{display:block; border:1px solid var(--edge); border-radius:10px; padding:26px 14px;
  text-align:center; text-decoration:none; color:var(--cyan); font-size:13px; background:rgba(0,0,0,.25)}
.apod-video:hover{border-color:rgba(110,231,255,.4)}
/* ---- states ---- */
.skel{border-radius:8px; background:linear-gradient(100deg,rgba(255,255,255,.04) 30%,rgba(255,255,255,.10) 50%,rgba(255,255,255,.04) 70%);
  background-size:200% 100%; animation:shimmer 1.4s linear infinite}
.err-box{border:1px dashed rgba(240,171,252,.4); border-radius:10px; padding:14px;
  font-size:12px; color:var(--pink); line-height:1.6}
.err-box .retry{color:var(--muted)}
.stale-box{margin-top:10px; font-size:11px; color:var(--muted)}
.stale-box b{color:var(--yellow)}
#test-banner{display:none; position:fixed; bottom:8px; right:10px; z-index:60;
  font-size:12px; padding:6px 12px; border-radius:8px; background:#0b1322; border:1px solid var(--edge)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes blink{50%{opacity:.25}}
@keyframes shimmer{to{background-position:-200% 0}}
@keyframes ping{0%{transform:scale(1);opacity:.8}100%{transform:scale(3.2);opacity:0}}
@media (max-width:800px){
  main{grid-template-columns:1fr}
  .clocks{margin-left:0; flex-wrap:wrap; gap:8px 16px}
  .big-count{font-size:48px}
  header{padding-top:50px}
}
@media (prefers-reduced-motion:reduce){
  .live-dot,.cd .sep,.skel,.iss-glow{animation:none}
  .iss-glow{display:none}
}
</style>
</head>

</main>
<div id="test-banner"></div>

/* ---------- tiny helpers ---------- */
const $ = id => document.getElementById(id);
const pad2 = n => String(n).padStart(2, '0');
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* equirectangular projection — the whole mapping story in two lines */
function latLonToXY(lat, lon, W = MAP_W, H = MAP_H) {
  return { x: (lon + 180) / 360 * W, y: (90 - lat) / 180 * H };
}

/* countdown seconds → "1d 00:00:00" | "T-0 reached" */
function fmtT(sec) {
  if (sec <= 0) return 'T-0 reached';
  const d = Math.floor(sec / 86400);
  const h = Math.floor(sec % 86400 / 3600), m = Math.floor(sec % 3600 / 60), s = Math.floor(sec % 60);
  return (d ? d + 'd ' : '') + pad2(h) + ':' + pad2(m) + ':' + pad2(s);
}

/* split a [{lat,lon},...] track into segments at dateline jumps (>180° lon) */
function splitTrack(pts) {
  const segs = [];
  let cur = [];
  for (const p of pts) {
    if (cur.length && Math.abs(p.lon - cur[cur.length - 1].lon) > 180) { segs.push(cur); cur = []; }
    cur.push(p);
  }
  if (cur.length) segs.push(cur);
  return segs;
}

function fmtIST(t) {
  return new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' }).format(new Date(t)) + ' IST';
}

/* ---------- localStorage wrapper (never throws) ---------- */
const store = {
  get(k) { try { const v = localStorage.getItem('srn:' + k); return v ? JSON.parse(v) : null; } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem('srn:' + k, JSON.stringify(v)); } catch (e) { /* quota/blocked: run cacheless */ } }
};

/* ---------- cachedFetch: the whole data-engineering story ----------
   fresh cache → return it; else fetch → store+return; fetch fails →
   stale cache flagged .stale, else throw → panel error state.
   `now` and `fetcher` are injectable so ?test can mock the clock. */
async function cachedFetch(key, url, maxAgeMs, opts = {}) {
  const now = opts.now || Date.now;
  const fetcher = opts.fetcher || (u => fetch(u).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }));
  const cached = store.get(key);
  if (cached && (now() - cached.t) < maxAgeMs) {
    console.debug('[cache] HIT ' + key + ' age=' + (now() - cached.t) + 'ms');
    return { t: cached.t, data: cached.data, stale: false, fromCache: true };
  }
  try {
    const data = await fetcher(url);
    const rec = { t: now(), data };
    store.set(key, rec);
    console.debug('[cache] MISS ' + key + ' → fetched fresh');
    return { t: rec.t, data, stale: false, fromCache: false };
  } catch (e) {
    if (cached) {
      console.debug('[cache] FETCH FAIL ' + key + ' → serving stale (' + e.message + ')');
      return { t: cached.t, data: cached.data, stale: true, fromCache: true };
    }
    throw e;
  }
}

/* ---------- panel state machinery ---------- */
function setChip(p, cls, txt) { const c = $('chip-' + p); c.className = 'chip ' + cls; c.textContent = txt; }

function renderLoading(p) {
  setChip(p, '', 'LOADING');
  const rows = { iss: ['aspect-ratio:2/1', 'height:52px'], astro: ['height:64px;width:40%', 'height:90px'], launch: ['height:40px', 'height:40px', 'height:40px'], apod: ['height:160px', 'height:16px;width:60%'] };
  $('body-' + p).innerHTML = rows[p].map(s => '<div class="skel" style="' + s + ';margin-bottom:10px"></div>').join('');
}

function renderError(p, apiName, staleRec, opts = {}) {
  setChip(p, 'err', opts.limited ? 'RATE LIMITED' : 'OFFLINE');
  const msg = opts.limited
    ? '&#9203; ' + esc(apiName) + ' rate limit hit (shared hourly quota)'
    : '&#9888; can\'t reach ' + esc(apiName);
  let html = '<div class="err-box">' + msg +
    ' <span class="retry">— retrying in <span id="retry-' + p + '">' + (opts.secs || 30) + '</span>s</span></div>';
  if (staleRec && staleRec.data) {
    html += '<div class="stale-box">showing last-good data · <b>as of ' + fmtIST(staleRec.t) + '</b></div>' +
            '<div id="stale-' + p + '"></div>';
  }
  $('body-' + p).innerHTML = html;
}

/* ---------- ISS panel ---------- */
const track = { past: store.get('track') || [], future: [] };

function validISS(d) {
  return d && Number.isFinite(d.latitude) && Number.isFinite(d.longitude) &&
    d.latitude >= -90 && d.latitude <= 90 && Number.isFinite(d.altitude) && Number.isFinite(d.velocity);
}

function buildMapSVG(d) {
  const p = latLonToXY(d.latitude, d.longitude);
  /* graticule every 30° */
  let grat = '';
  for (let lon = -150; lon <= 150; lon += 30) grat += '<line class="grat" x1="' + ((lon + 180) / 360 * MAP_W) + '" y1="0" x2="' + ((lon + 180) / 360 * MAP_W) + '" y2="' + MAP_H + '"/>';
  for (let lat = -60; lat <= 60; lat += 30) grat += '<line class="grat" x1="0" y1="' + ((90 - lat) / 180 * MAP_H) + '" x2="' + MAP_W + '" y2="' + ((90 - lat) / 180 * MAP_H) + '"/>';
  const toPoly = (pts, cls) => splitTrack(pts).filter(s => s.length > 1).map(seg =>
    '<polyline class="' + cls + '" points="' + seg.map(q => { const c = latLonToXY(q.lat, q.lon); return c.x.toFixed(1) + ',' + c.y.toFixed(1); }).join(' ') + '"/>').join('');
  /* past track fades: three age buckets */
  const n = track.past.length, third = Math.max(1, Math.ceil(n / 3));
  let past = '';
  [[0, .15], [1, .32], [2, .6]].forEach(([i, op]) => {
    const slice = track.past.slice(i * third, (i + 1) * third + 1);
    if (slice.length > 1) past += '<g opacity="' + op + '">' + toPoly(slice, 'track') + '</g>';
  });
  const fut = toPoly(track.future, 'predict');
  const fpR = Number.isFinite(d.footprint) ? (d.footprint / 2 / 111.32) * (MAP_H / 180) : 0;
  const fp = fpR ? '<circle class="footprint" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + fpR.toFixed(1) + '"/>' : '';
  return '<svg viewBox="0 0 ' + MAP_W + ' ' + MAP_H + '" preserveAspectRatio="none" role="img" aria-label="world map with ISS position">' +
    grat + '<path class="coast" d="' + COAST_PATH + '"/>' + fp + past + fut +
    '<circle class="iss-glow" r="7" style="cx:' + p.x.toFixed(1) + 'px;cy:' + p.y.toFixed(1) + 'px" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '"/>' +
    '<circle class="iss-dot" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="4"/></svg>';
}

function renderISS(rec) {
  const d = rec.data;
  if (!validISS(d)) throw new Error('bad ISS payload');
  setChip('iss', rec.stale ? 'stale' : 'live', rec.stale ? 'STALE · ' + fmtIST(rec.t) : 'LIVE · 5s');
  const R = (k, v, u) => '<div class="r"><div class="k">' + k + '</div><div class="v">' + v + (u ? ' <span class="u">' + u + '</span>' : '') + '</div></div>';
  $('body-iss').innerHTML =
    '<div class="mapwrap">' + buildMapSVG(d) + '</div>' +
    '<div class="readouts">' +
    R('LAT', d.latitude.toFixed(4), '&deg;') + R('LON', d.longitude.toFixed(4), '&deg;') +
    R('ALT', d.altitude.toFixed(1), 'km') + R('VEL', Math.round(d.velocity).toLocaleString('en-US'), 'km/h') +
    '</div>' +
    '<div class="over-line">sunlight: <b>' + esc(d.visibility || '?') + '</b> · ground track: <b style="color:var(--cyan)">past 45 min</b> / <b style="color:var(--violet)">predicted +45 min</b></div>';
}

/* ---------- humans panel ---------- */
function craftOf(a) {
  if (/starman/i.test(a.name)) return 'ELON’S ROADSTER';
  const ag = (a.agency || '').toUpperCase();
  if (ag === 'CNSA' || ag === 'CMSA' || /chinese/i.test(a.nationality || '')) return 'TIANGONG';
  return 'ISS';
}
function renderAstros(rec) {
  const list = (rec.data.results || rec.data).map(a => ({
    name: a.name, nationality: a.nationality || '',
    agency: a.agency ? (a.agency.abbrev || a.agency.name || a.agency) : (a.agency === '' ? '' : a.agency)
  }));
  const humans = list.filter(a => !/starman/i.test(a.name));
  const groups = {};
  for (const a of humans) (groups[craftOf(a)] = groups[craftOf(a)] || []).push(a);
  setChip('astro', rec.stale ? 'stale' : 'live', rec.stale ? 'STALE · ' + fmtIST(rec.t) : 'CACHED 1h');
  let html = '<div class="big-count">' + humans.length + '</div><div class="big-label">PEOPLE OFF THE PLANET</div>';
  for (const g of Object.keys(groups).sort()) {
    html += '<div class="craft"><h3>&#9642; ' + esc(g) + ' &middot; ' + groups[g].length + '</h3><ul>' +
      groups[g].map(a => '<li>' + esc(a.name) + ' <span class="ag">' + esc(a.agency || a.nationality) + '</span></li>').join('') + '</ul></div>';
  }
  if (list.length !== humans.length) html += '<div class="foot-note">+ Starman (mannequin) in a Tesla Roadster, heliocentric orbit</div>';
  html += '<div class="foot-note">craft inferred from agency · data: <a href="https://thespacedevs.com/llapi" rel="noopener">Launch Library 2</a></div>';
  $('body-astro').innerHTML = html;
}

/* ---------- launches panel ---------- */
let launchList = [];
function normLaunches(data) {
  return (data.results || data).map(r => ({
    name: r.name, status: r.status && r.status.abbrev ? r.status.abbrev : (r.status || ''),
    net: r.net, lsp: r.lsp_name || r.lsp || '', pad: r.pad || '', location: r.location || ''
  }));
}
function renderLaunches(rec) {
  launchList = normLaunches(rec.data);
  setChip('launch', rec.stale ? 'stale' : 'live', rec.stale ? 'STALE · ' + fmtIST(rec.t) : 'CACHED 1h');
  $('body-launch').innerHTML = launchList.map((l, i) => {
    const [rocket, mission] = l.name.includes('|') ? l.name.split('|').map(s => s.trim()) : [l.name, ''];
    return '<div class="launch">' +
      '<span class="nm">' + esc(rocket) + (mission ? ' <span style="color:var(--violet)">' + esc(mission) + '</span>' : '') + '</span>' +
      '<span class="st' + (l.status === 'Go' ? ' go' : '') + '">' + esc(l.status || 'TBD') + '</span>' +
      '<span class="cd" data-i="' + i + '">&hellip;</span>' +
      '<span class="meta">' + esc(l.lsp) + ' &middot; ' + esc(l.pad) + ', ' + esc(l.location) + '</span>' +
      '</div>';
  }).join('');
  tickCountdowns();
}
function tickCountdowns() {
  document.querySelectorAll('#body-launch .cd').forEach(el => {
    const l = launchList[+el.dataset.i];
    if (!l || !l.net) { el.textContent = 'NET TBD'; return; }
    const sec = (new Date(l.net).getTime() - Date.now()) / 1000;
    const s = fmtT(sec);
    if (s === 'T-0 reached') { el.classList.add('t0'); el.textContent = 'T-0 reached'; }
    else el.innerHTML = 'T&minus;' + esc(s).replace(/:/g, '<span class="sep">:</span>');
  });
}

/* ---------- APOD panel ---------- */
function renderAPOD(rec) {
  const d = rec.data;
  const isVideo = Q.has('apodvideo') || d.media_type === 'video';
  setChip('apod', rec.stale ? 'stale' : 'live', rec.stale ? 'STALE · ' + fmtIST(rec.t) : 'CACHED 24h');
  let media;
  if (isVideo) {
    media = '<a class="apod-video" href="' + esc(d.url) + '" rel="noopener" target="_blank">&#9654; today\'s APOD is a video &mdash; watch it on the source site</a>';
  } else {
    media = '<img class="apod-img" src="' + esc(d.url) + '" alt="' + esc(d.title) + '">';
  }
  $('body-apod').innerHTML = media +
    '<div class="apod-title">' + esc(d.title) + '</div>' +
    '<div class="apod-date">' + esc(d.date) + '</div>' +
    '<div class="apod-x" id="apod-x">' + esc(d.explanation) + '</div>';
  const x = $('apod-x');
  x.addEventListener('click', () => x.classList.toggle('open'));
  const img = document.querySelector('#body-apod .apod-img');
  if (img) img.addEventListener('error', () => { renderError('apod', 'apod.nasa.gov (image)', null); scheduleRetry('apod', loadAPOD); });
}

/* ---------- clocks ---------- */
function tickClocks() {
  const now = new Date();
  $('clock-utc').textContent = pad2(now.getUTCHours()) + ':' + pad2(now.getUTCMinutes()) + ':' + pad2(now.getUTCSeconds());
  $('clock-ist').textContent = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(now);
}

/* ---------- live orchestration ---------- */
const retryTimers = {};
function scheduleRetry(p, fn, secs) {
  let left = secs || 30;
  clearInterval(retryTimers[p]);
  retryTimers[p] = setInterval(() => {
    left--;
    const el = $('retry-' + p);
    if (el) el.textContent = left;
    if (left <= 0) { clearInterval(retryTimers[p]); fn(); }
  }, 1000);
}

async function loadISS() {
  try {
    const rec = await cachedFetch('iss', API.iss, 4000);
    if (!validISS(rec.data)) throw new Error('invalid ISS payload shape');
    if (!rec.fromCache) {
      const last = track.past[track.past.length - 1];
      if (!last || (rec.data.timestamp - last.t) >= 30) {
        track.past.push({ t: rec.data.timestamp, lat: rec.data.latitude, lon: rec.data.longitude });
        const cutoff = rec.data.timestamp - 45 * 60;
        track.past = track.past.filter(q => q.t >= cutoff);
        store.set('track', track.past);
      }
    }
    renderISS(rec);
  } catch (e) {
    const stale = store.get('iss');
    renderError('iss', 'api.wheretheiss.at', stale);
    scheduleRetry('iss', loadISS);
  }
}
async function loadISSFuture() {
  try {
    const nowS = Math.floor(Date.now() / 1000);
    const stamps = Array.from({ length: 10 }, (_, i) => nowS + (i + 1) * 270); /* 10 pts × 4.5 min = +45 min */
    const rec = await cachedFetch('issfut', API.issFut(stamps), 9 * 60 * 1000);
    if (Array.isArray(rec.data)) track.future = rec.data.filter(validISS).map(q => ({ lat: q.latitude, lon: q.longitude }));
  } catch (e) { track.future = []; /* predicted path is decoration; no error state */ }
}
async function loadLaunches() {
  try {
    const rec = await cachedFetch('launches', API.launch, 60 * 60 * 1000);
    renderLaunches(rec);
    if (rec.stale) return; /* stale render is fine; retry comes from hourly resync */
  } catch (e) {
    const lim = /HTTP 429/.test(e.message);
    renderError('launch', 'll.thespacedevs.com', store.get('launches'), { limited: lim, secs: lim ? 600 : 30 });
    scheduleRetry('launch', loadLaunches, lim ? 600 : 30); /* retrying a 15/hr limit every 30s just re-exhausts it */
  }
}
async function loadAstros() {
  try {
    const rec = await cachedFetch('astros', API.astro, 60 * 60 * 1000);
    renderAstros(rec);
  } catch (e) {
    const lim = /HTTP 429/.test(e.message);
    renderError('astro', 'll.thespacedevs.com', store.get('astros'), { limited: lim, secs: lim ? 600 : 30 });
    scheduleRetry('astro', loadAstros, lim ? 600 : 30);
  }
}
async function loadAPOD() {
  try {
    const rec = await cachedFetch('apod', API.apod, 24 * 60 * 60 * 1000);
    renderAPOD(rec);
  } catch (e) {
    const lim = /HTTP 429/.test(e.message);
    renderError('apod', 'api.nasa.gov', store.get('apod'), { limited: lim, secs: lim ? 600 : 30 });
    scheduleRetry('apod', loadAPOD, lim ? 600 : 30);
  }
}

function bootLive() {
  ['iss', 'astro', 'launch', 'apod'].forEach(renderLoading);
  loadISSFuture().then(loadISS);
  loadLaunches(); loadAstros(); loadAPOD();
  setInterval(loadISS, 5000);
  setInterval(loadISSFuture, 10 * 60 * 1000);
  setInterval(loadLaunches, 60 * 60 * 1000);
  setInterval(loadAstros, 60 * 60 * 1000);
  setInterval(loadAPOD, 60 * 60 * 1000);
}

function bootMock() {
  const rec = d => ({ t: Date.now(), data: d, stale: false, fromCache: false });
  track.past = [];
  const base = { ...FIX.iss };
  for (let i = 12; i >= 1; i--) track.past.push({ t: base.timestamp - i * 200, lat: base.latitude - i * 2.2, lon: base.longitude - i * 3.1 });
  track.future = Array.from({ length: 10 }, (_, i) => ({ lat: base.latitude + (i + 1) * 2.0, lon: base.longitude + (i + 1) * 3.4 }));
  renderISS(rec(FIX.iss));
  renderAstros(rec({ results: FIX.astros.map(a => ({ name: a.name, nationality: a.nationality, agency: { abbrev: a.agency } })) }));
  renderLaunches(rec({ results: FIX.launches.map(l => ({ name: l.name, status: { abbrev: l.status }, net: l.net, lsp_name: l.lsp, pad: l.pad, location: l.location })) }));
  renderAPOD(rec(FIX.apod));
  setInterval(tickCountdowns, 1000);
}

/* ---------- ?test harness ---------- */
async function runTests() {
  const results = [];
  const ok = (name, cond) => results.push({ name, pass: !!cond });
  /* projection */
  let p = latLonToXY(0, 0);       ok('proj (0,0)→center', Math.abs(p.x - 500) < .01 && Math.abs(p.y - 250) < .01);
  p = latLonToXY(90, -180);       ok('proj (90,-180)→top-left', Math.abs(p.x) < .01 && Math.abs(p.y) < .01);
  p = latLonToXY(-90, 180);       ok('proj (-90,180)→bottom-right', Math.abs(p.x - 1000) < .01 && Math.abs(p.y - 500) < .01);
  p = latLonToXY(12.97, 77.59);   ok('proj Bangalore in India bbox', p.x >= 700 && p.x <= 730 && p.y >= 200 && p.y <= 230);
  /* countdown */
  ok('fmtT 86400 → "1d 00:00:00"', fmtT(86400) === '1d 00:00:00');
  ok('fmtT 3661 → "01:01:01"', fmtT(3661) === '01:01:01');
  ok('fmtT 0 → T-0 reached', fmtT(0) === 'T-0 reached' && fmtT(-5) === 'T-0 reached');
  /* track split */
  const segs = splitTrack([{ lat: 0, lon: 170 }, { lat: 1, lon: 179 }, { lat: 2, lon: -179 }, { lat: 3, lon: -170 }]);
  ok('splitTrack breaks at dateline', segs.length === 2 && segs[0].length === 2 && segs[1].length === 2);
  /* cachedFetch with mocked clock + fetcher */
  try { localStorage.removeItem('srn:tst'); } catch (e) {}
  let fetchCount = 0;
  const F = v => () => { fetchCount++; return Promise.resolve(v); };
  const FAIL = () => { fetchCount++; return Promise.reject(new Error('net down')); };
  let r = await cachedFetch('tst', 'x', 5000, { now: () => 1000, fetcher: F({ v: 1 }) });
  ok('cache: first call fetches', r.data.v === 1 && !r.fromCache && fetchCount === 1);
  r = await cachedFetch('tst', 'x', 5000, { now: () => 3000, fetcher: F({ v: 2 }) });
  ok('cache: fresh hit skips fetch', r.data.v === 1 && r.fromCache && !r.stale && fetchCount === 1);
  r = await cachedFetch('tst', 'x', 5000, { now: () => 99999, fetcher: F({ v: 3 }) });
  ok('cache: expired refetches', r.data.v === 3 && !r.fromCache && fetchCount === 2);
  r = await cachedFetch('tst', 'x', 5000, { now: () => 999999, fetcher: FAIL });
  ok('cache: fail → stale flagged', r.data.v === 3 && r.stale === true && fetchCount === 3);
  try { localStorage.removeItem('srn:tst'); } catch (e) {}
  let threw = false;
  try { await cachedFetch('tst', 'x', 5000, { now: () => 1, fetcher: FAIL }); } catch (e) { threw = true; }
  ok('cache: fail + no cache throws', threw);
  /* ISS payload validation */
  ok('validISS rejects NaN', !validISS({ latitude: NaN, longitude: 0, altitude: 400, velocity: 27000 }) && validISS(FIX.iss));
  /* report */
  const fails = results.filter(r2 => !r2.pass);
  const msg = fails.length === 0
    ? 'TESTS PASS ' + results.length + '/' + results.length
    : 'TESTS FAIL ' + fails.length + '/' + results.length + ': ' + fails.map(f => f.name).join('; ');
  document.title = msg;
  const b = $('test-banner');
  b.style.display = 'block';
  b.style.color = fails.length ? 'var(--pink)' : '#4ade80';
  b.textContent = msg;
  results.forEach(r2 => console.debug((r2.pass ? 'PASS ' : 'FAIL ') + r2.name));
}

/* ---------- boot ---------- */
window.addEventListener('unhandledrejection', e => { e.preventDefault(); console.debug('[guard] swallowed rejection:', e.reason && e.reason.message); });
tickClocks();
setInterval(tickClocks, 1000);
setInterval(tickCountdowns, 1000);
if (MODE === 'test') { ['iss', 'astro', 'launch', 'apod'].forEach(renderLoading); runTests(); }
else if (MODE === 'loading') { ['iss', 'astro', 'launch', 'apod'].forEach(renderLoading); }
else if (MODE === 'error') {
  renderError('iss', 'api.wheretheiss.at', null);
  renderError('astro', 'll.thespacedevs.com', null);
  renderError('launch', 'll.thespacedevs.com', null);
  renderError('apod', 'api.nasa.gov', null);
}
else if (MODE === 'mock') { bootMock(); }
else { bootLive(); }

/* tools note — map generation (kept for reproducibility):
   ne_110m_coastline.geojson → project equirect (x=(lon+180)/360*1000,
   y=(90-lat)/180*500) → Ramer-Douglas-Peucker eps=0.9px → round to int →
   relative lineto path string. Script: scratch/make_map.py. */
</script>

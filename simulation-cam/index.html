<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>simulation cam</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23060a13'/%3E%3Ctext x='32' y='46' font-size='38' text-anchor='middle'%3E%F0%9F%A7%BF%3C/text%3E%3C/svg%3E">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:"Arial Narrow",Arial,sans-serif}
  #v{display:none}
  #c{position:fixed;inset:0;width:100%;height:100%}
  #start{position:fixed;inset:0;background:#000;color:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;z-index:2}
  #start h1{font-weight:400;letter-spacing:.35em;font-size:15px;margin:0;opacity:.9}
  #start p{font-size:11px;letter-spacing:.15em;opacity:.45;margin:0;max-width:260px;line-height:1.7}
  #go{background:none;border:1px solid rgba(255,255,255,.6);color:#fff;padding:10px 26px;
    font-family:inherit;font-size:12px;letter-spacing:.3em;cursor:pointer}
  #go:active{background:rgba(255,255,255,.15)}
  #err{color:#f66;font-size:11px;letter-spacing:.1em;max-width:280px;line-height:1.6}
  #flip{position:fixed;right:14px;bottom:14px;z-index:1;display:none;background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.8);width:40px;height:40px;
    border-radius:50%;font-size:16px;cursor:pointer}
</style>

<video id="v" playsinline muted></video>
<canvas id="c"></canvas>
<button id="flip" title="flip camera">&#8646;</button>
<div id="start">
  <h1>SIMULATION CAM</h1>
  <p>OPENS YOUR CAMERA AND RENDERS THE TRACKING LAYER OF THE SIMULATION. NOTHING IS RECORDED OR SENT ANYWHERE.</p>
  <button id="go">OPEN CAMERA</button>
  <div id="err"></div>
</div>

<script>
'use strict';
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const small = document.createElement('canvas');
const sctx = small.getContext('2d', {willReadFrequently:true});

const MAX_TRACKERS = 450;
const MAX_LINKS = 46;
const SW = 176;                      // motion-grid width in cells

let W=0, H=0, SH=0, cell=1;
let prevLum = null;
let trackers = [], links = [];
let nextId = 300 + (Math.random()*30000|0); // ids only ever count up, like the real thing
let facing = 'user', stream = null, running = false;
let testMode = false, frameNo = 0;   // ?test: synthetic pattern instead of camera (headless verification)

function resize(){
  W = canvas.width = innerWidth * devicePixelRatio;
  H = canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
  SH = Math.max(24, Math.round(SW*H/W));
  small.width = SW; small.height = SH;
  cell = W/SW;
  prevLum = null;
}
addEventListener('resize', resize);

function spawn(x, y){
  const r = Math.random();
  const t = {
    x, y, id: nextId++,
    vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
    age:0, ttl: 40 + Math.random()*150,
    size: 9 + Math.random()*4,
    kind: r < .78 ? 'tag' : r < .96 ? 'box' : 'fill',
    w: 14 + Math.random()*60, h: 8 + Math.random()*40,
    teal: Math.random() < .05,
  };
  trackers.push(t);
  // occasionally wire the newcomer to an older tracker — the web of lines
  if (links.length < MAX_LINKS && trackers.length > 4 && Math.random() < .12){
    links.push({a:t, b:trackers[Math.random()*(trackers.length-1)|0]});
  }
  return t;
}

function drawTestPattern(){
  ctx.fillStyle = '#1a2030'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#555'; ctx.fillRect(W*.1, H*.6, W*.3, H*.25);   // static edges → feature points
  const a = frameNo/20;
  ctx.fillStyle = '#eee';
  ctx.beginPath();
  ctx.arc(W/2 + Math.cos(a)*W*.3, H/2 + Math.sin(a*1.3)*H*.3, W*.08, 0, 7);
  ctx.fill();
}

function step(){
  if (!running) return;
  requestAnimationFrame(step);
  frameNo++;

  // 1. draw the camera frame, cover-cropped, mirrored for the front camera
  if (testMode){
    drawTestPattern();
  } else {
    if (video.readyState < 2) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    const s = Math.max(W/vw, H/vh);
    const dw = vw*s, dh = vh*s;
    ctx.save();
    if (facing === 'user'){ ctx.translate(W,0); ctx.scale(-1,1); }
    ctx.drawImage(video, (W-dw)/2, (H-dh)/2, dw, dh);
    ctx.restore();
  }

  // 2. sample the freshly drawn frame at low res and diff against the last one
  sctx.drawImage(canvas, 0, 0, SW, SH);
  const px = sctx.getImageData(0, 0, SW, SH).data;
  const n = SW*SH;
  const lum = new Uint8Array(n);
  for (let i=0;i<n;i++){
    const j=i*4;
    lum[i] = (px[j]*3 + px[j+1]*4 + px[j+2]) >> 3;
  }
  const motion = [], strong = [], feats = [];
  if (prevLum){
    for (let i=0;i<n-SW-1;i++){
      const d = Math.abs(lum[i]-prevLum[i]);
      // neighbor confirmation filters out sensor noise on flat walls
      if (d > 30 && (Math.abs(lum[i+1]-prevLum[i+1]) > 16 || Math.abs(lum[i+SW]-prevLum[i+SW]) > 16)){
        motion.push(i);
        if (d > 70) strong.push(i);
      }
    }
  }
  // static "feature" points (edges) so calm scenes still get sparse labels
  if (motion.length < 30){
    for (let i=0;i<n-SW-1;i+=3){
      if (Math.abs(lum[i]-lum[i+1]) + Math.abs(lum[i]-lum[i+SW]) > 52) feats.push(i);
    }
  }
  prevLum = lum;

  // 3. population control: density follows the amount of motion
  const want = Math.min(MAX_TRACKERS, 26 + motion.length*3);
  let spawns = Math.min(16, Math.max(0, want - trackers.length));
  const occupied = new Set();   // coarse grid: one label per region, so they scatter instead of piling up
  const osz = W/32;
  const okey = (x,y) => (x/osz|0) + 4096*(y/osz|0);
  for (const t of trackers) occupied.add(okey(t.x, t.y));
  while (spawns-- > 0){
    let i;
    if (strong.length && Math.random() < .65) i = strong[Math.random()*strong.length|0];
    else if (motion.length)       i = motion[Math.random()*motion.length|0];
    else if (feats.length)        i = feats[Math.random()*feats.length|0];
    else                          i = Math.random()*n|0;
    const x = (i%SW + Math.random())*cell, y = ((i/SW|0) + Math.random())*cell;
    const k = okey(x,y);
    if (occupied.has(k)) continue;
    occupied.add(k);
    spawn(x, y);
  }
  // trackers whose neighborhood went still decay fast — the cloud clings to what's moving
  const motionSet = new Set(motion);
  for (const t of trackers){
    const ci = (t.x/cell|0) + SW*(t.y/cell|0);
    if (!(motionSet.has(ci) || motionSet.has(ci-1) || motionSet.has(ci+1) ||
          motionSet.has(ci-SW) || motionSet.has(ci+SW))) t.age += 3;
  }
  trackers = trackers.filter(t => {
    t.age++;
    if (t.age >= t.ttl || t.x<-80 || t.x>W+80 || t.y<-40 || t.y>H+40) t.dead = true;
    return !t.dead;
  });
  if (trackers.length > MAX_TRACKERS)
    trackers.splice(0, trackers.length - MAX_TRACKERS).forEach(t => t.dead = true);
  links = links.filter(l => !l.a.dead && !l.b.dead);

  // 4. overlay — lines under labels
  const F = devicePixelRatio;
  ctx.lineWidth = F * .75;
  ctx.strokeStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath();
  for (const l of links){ ctx.moveTo(l.a.x, l.a.y); ctx.lineTo(l.b.x, l.b.y); }
  ctx.stroke();

  for (const t of trackers){
    t.x += t.vx + (Math.random()-.5)*.5;   // the nervous jitter is the whole aesthetic
    t.y += t.vy + (Math.random()-.5)*.5;
    const fade = Math.min(1, (t.ttl - t.age)/20, t.age/6);
    const col = t.teal ? '127,216,216' : '255,255,255';
    ctx.font = (t.size*F)+'px "Arial Narrow",Arial';
    if (t.kind === 'fill'){
      ctx.fillStyle = `rgba(${col},${.85*fade})`;
      ctx.fillRect(t.x, t.y - t.h*F*.35, t.w*F*.8, t.h*F*.35);
      ctx.fillStyle = `rgba(0,0,0,${.8*fade})`;
      ctx.fillText(t.id, t.x + 3*F, t.y - 2*F);
    } else {
      if (t.kind === 'box'){
        ctx.strokeStyle = `rgba(${col},${.75*fade})`;
        ctx.strokeRect(t.x - t.w*F/2, t.y + 2*F, t.w*F, t.h*F);
      }
      ctx.strokeStyle = `rgba(${col},${.9*fade})`;
      ctx.beginPath();                                   // little ⌐ tick before the number
      ctx.moveTo(t.x - 2*F, t.y + 3*F);
      ctx.lineTo(t.x - 2*F, t.y);
      ctx.lineTo(t.x + 2*F, t.y);
      ctx.stroke();
      ctx.fillStyle = `rgba(${col},${.92*fade})`;
      ctx.fillText(t.id, t.x + 3*F, t.y);
    }
  }
}

async function openCam(){
  const errBox = document.getElementById('err');
  errBox.textContent = '';
  try{
    if (!navigator.mediaDevices) throw new Error('camera API unavailable — open this page over https or file://, not plain http');
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: facing, width:{ideal:1280}, height:{ideal:720} }, audio:false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('start').style.display = 'none';
    document.getElementById('flip').style.display = 'block';
    resize();
    if (!running){ running = true; requestAnimationFrame(step); }
  }catch(e){
    errBox.textContent = 'CAMERA FAILED: ' + e.message;
  }
}

document.getElementById('go').onclick = openCam;
document.getElementById('flip').onclick = () => { facing = facing==='user' ? 'environment' : 'user'; openCam(); };
resize();
if (location.search.includes('test')){              // headless-verification hook
  testMode = true;
  document.getElementById('start').style.display = 'none';
  running = true;
  requestAnimationFrame(step);
}
</script>

<script>
/* anonymous visit beacon — counts loads + presence heartbeats, no cookies */
(function(){
  if (location.protocol === "file:" || location.hostname === "localhost") return;
  var EP = "https://site-analytics.vaibhavpro9210.workers.dev/ping";
  var sid = sessionStorage.getItem("va_sid");
  if (!sid) { sid = Math.random().toString(36).slice(2) + Date.now().toString(36); sessionStorage.setItem("va_sid", sid); }
  function send(kind){
    try { navigator.sendBeacon(EP, new Blob([JSON.stringify({sid:sid, page:location.pathname, kind:kind})], {type:"text/plain"})); } catch(e){}
  }
  send("load");
  setInterval(function(){ if (document.visibilityState === "visible") send("beat"); }, 60000);
})();
</script>
